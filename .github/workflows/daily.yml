name: Daily Quiz Update
on:
  schedule:
    - cron: '5 15 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install Dependencies
        run: pip install requests
      - name: Run Script to Generate HTML
        env:
          MEM_INFO_ID: ${{ secrets.MEM_INFO_ID }}
        run: python main.py
      - name: Commit and Push
        run: |
          git config --global user.name "Auto-Bot"
          git config --global user.email "bot@noreply.github.com"
          if [ -f "index.html" ]; then
            git add index.html
            git commit -m "Update quiz for $(date +'%Y-%m-%d')" || exit 0
            git push
          else
            echo "🚨 index.html 파일이 없습니다! 파이썬 스크립트에서 데이터를 가져오지 못했습니다."
            exit 1
          fi
